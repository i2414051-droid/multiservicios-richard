<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Registro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="height:100vh;">

    <div class="card shadow p-4" style="width:350px;">

        <h3 class="text-center mb-3">📝 Crear cuenta</h3>

        <form method="POST">

            <input type="email" name="correo" placeholder="Correo electrónico" class="form-control mb-3" required>

            <input type="password" name="password" placeholder="Contraseña" class="form-control mb-3" required>

            <input type="password" name="confirmar" placeholder="Confirmar contraseña" class="form-control mb-3" required>

            <button class="btn btn-success w-100">
                Registrarse
            </button>

        </form>

        <div class="text-center mt-3">
            <a href="/login">¿Ya tienes cuenta? Inicia sesión</a>
        </div>

    </div>

</div>

</body>
</html>
