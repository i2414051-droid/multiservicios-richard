{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<h3>🧾 Datos para la boleta</h3>

<div id="alerta"></div>

<input type="hidden" id="venta_id" value="{{ venta_id }}">

<select id="tipo" class="form-control mb-2">
    <option value="dni">DNI</option>
    <option value="ruc">RUC</option>
</select>

<input type="text" id="numero" class="form-control mb-2" placeholder="Número">

<button class="btn btn-success mb-3" onclick="consultar()">Consultar</button>

<input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre / Razón social" readonly>

<button class="btn btn-primary w-100" onclick="confirmarCompra()">
    Confirmar compra
</button>

</div>

<script>
async function consultar() {
    const numero = document.getElementById("numero").value;
    const tipo = document.getElementById("tipo").value;
    const venta_id = document.getElementById("venta_id").value;

    if (!numero) {
        alert("Ingresa un número de documento");
        return;
    }

    try {
        const res = await fetch(`/consultar/${tipo}/${numero}?venta_id=${venta_id}`);
        const data = await res.json();

        if (data.error) {
            alert(data.error);
            return;
        }

        if (tipo === "dni") {
            const nombre = (data.nombres || "") + " " + (data.apellidoPaterno || "") + " " + (data.apellidoMaterno || "");
            document.getElementById("nombre").value = nombre.trim() || "No encontrado";
        }

        if (tipo === "ruc") {
            document.getElementById("nombre").value = data.razonSocial || "No encontrado";
        }
    } catch (e) {
        alert("Error al consultar. Verifica tu conexión.");
    }
}

function confirmarCompra() {
    const numero = document.getElementById("numero").value;
    const nombre = document.getElementById("nombre").value;

    window.location.href = "/procesar_compra?doc=" + encodeURIComponent(numero) + "&nombre=" + encodeURIComponent(nombre);
}
</script>

{% endblock %}
